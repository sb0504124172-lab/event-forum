<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventPro — פורום מארגני אירועים</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #F7F8FA; color: #1B2A4A; direction: rtl; }
    header { background: #1B2A4A; color: #fff; padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; }
    .logo-icon { width: 32px; height: 32px; background: #C8952A; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .stats-bar { background: #FDF3E0; border-bottom: 1px solid #EDD99A; padding: 10px 32px; display: flex; gap: 32px; }
    .stat-num { font-weight: 800; color: #C8952A; margin-left: 6px; }
    main { max-width: 900px; margin: 32px auto; padding: 0 32px; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    h2 { font-size: 22px; font-weight: 700; }
    .btn { background: #C8952A; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; font-family: inherit; }
    .btn:hover { background: #b07a1e; }
    .post-card { background: #fff; border: 1px solid #E2E6ED; border-radius: 12px; padding: 18px 20px; margin-bottom: 12px; display: flex; gap: 14px; cursor: pointer; transition: box-shadow 0.15s; }
    .post-card:hover { box-shadow: 0 4px 16px rgba(27,42,74,0.08); }
    .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; flex-shrink: 0; font-size: 16px; }
    .post-title { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
    .post-meta { font-size: 13px; color: #9BA8BC; }
    .badge { background: #EEF1F6; color: #6B7A96; padding: 2px 10px; border-radius: 20px; font-size: 12px; margin-left: 8px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .modal { background: #fff; border-radius: 16px; padding: 32px; width: 90%; max-width: 520px; }
    .modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border: 1.5px solid #E2E6ED; border-radius: 8px; font-size: 14px; font-family: inherit; direction: rtl; outline: none; }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .modal-footer { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
    .btn-cancel { background: #EEF1F6; color: #6B7A96; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 14px; }
    .loading { text-align: center; padding: 60px; color: #9BA8BC; font-size: 16px; }
  </style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-icon">🎪</div> EventPro</div>
</header>
<div class="stats-bar">
  <span><span class="stat-num" id="stat-posts">0</span> פוסטים</span>
  <span>קהילת מארגני אירועים</span>
</div>
<main>
  <div class="header-row">
    <h2>פורום מארגנים</h2>
    <button class="btn" onclick="openModal()">+ פוסט חדש</button>
  </div>
  <div id="posts-list"><div class="loading">טוען...</div></div>
</main>

<div id="modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h3>פוסט חדש</h3>
    <div class="form-group"><label>שם</label><input id="inp-author" placeholder="שם מלא"></div>
    <div class="form-group"><label>כותרת</label><input id="inp-title" placeholder="כותרת הפוסט"></div>
    <div class="form-group"><label>קטגוריה</label>
      <select id="inp-cat"><option>כללי</option><option>שאלות וטיפים</option><option>ספקים מומלצים</option></select>
    </div>
    <div class="form-group"><label>תוכן</label><textarea id="inp-content" placeholder="תוכן הפוסט..."></textarea></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">ביטול</button>
      <button class="btn" onclick="submitPost()">פרסם</button>
    </div>
  </div>
</div>

<script>
  const COLORS = ['#1B2A4A','#C8952A','#1A7A4A','#6B3A8A'];
  const color = n => COLORS[n.charCodeAt(0) % COLORS.length];
  const ago = d => {
    const s = (Date.now() - new Date(d)) / 1000;
    if (s < 60) return 'עכשיו';
    if (s < 3600) return `לפני ${Math.floor(s/60)} דקות`;
    if (s < 86400) return `לפני ${Math.floor(s/3600)} שעות`;
    return `לפני ${Math.floor(s/86400)} ימים`;
  };

  async function load() {
    const posts = await fetch('/api/posts').then(r => r.json());
    document.getElementById('stat-posts').textContent = posts.length;
    document.getElementById('posts-list').innerHTML = posts.length ? posts.map(p => `
      <div class="post-card">
        <div class="avatar" style="background:${color(p.author)}">${p.author[0]}</div>
        <div>
          <span class="badge">${p.category}</span>
          <div class="post-title">${p.title}</div>
          <div class="post-meta">${p.author} · ${ago(p.created_at)} · 💬 ${p.replies_count||0}</div>
        </div>
      </div>`).join('') : '<div class="loading">אין פוסטים עדיין</div>';
  }

  function openModal() { document.getElementById('modal').style.display='flex'; }
  function closeModal() { document.getElementById('modal').style.display='none'; }

  async function submitPost() {
    const title = document.getElementById('inp-title').value.trim();
    const content = document.getElementById('inp-content').value.trim();
    const author = document.getElementById('inp-author').value.trim();
    const category = document.getElementById('inp-cat').value;
    if (!title||!content||!author) { alert('נא למלא את כל השדות'); return; }
    await fetch('/api/posts', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title,content,author,category}) });
    closeModal();
    load();
  }

  load();
</script>
</body>
</html>
